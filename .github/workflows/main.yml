
name: CI Pipeline


on:
  push:
    branches: [ main ]  
  pull_request:
    branches: [ main ] 

jobs:
  test:
    runs-on: ubuntu-latest  # Работаем на Ubuntu VM
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3  

      - name: Set up .NET Core SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '4.8'  # Укажите нужную версию DotNet, соответствующую вашему проекту

      - name: Install dependencies
        run: dotnet restore  # Установка зависимостей

      - name: Build project
        run: dotnet build --configuration Release 

      - name: Run unit tests
        run: dotnet test --no-build --logger trx 
